<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafaf7"/>
      <stop offset="1" stop-color="#e7e4d8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6fb8"/>
      <stop offset="1" stop-color="#1d4a8a"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f3370"/>
      <stop offset="1" stop-color="#082555"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Sombra base -->
  <ellipse cx="64" cy="110" rx="42" ry="4" fill="#000" opacity="0.12"/>

  <!-- Tapa trasera derecha (3D) -->
  <path d="M 65 28 L 110 30 L 110 100 L 65 102 Z"
        fill="#102f5e" opacity="0.85"/>
  <!-- Tapa trasera izquierda (3D) -->
  <path d="M 63 28 L 18 30 L 18 100 L 63 102 Z"
        fill="#102f5e" opacity="0.85"/>

  <!-- Cubierta principal izquierda -->
  <path d="M 64 32 L 22 34 L 22 98 L 64 100 Z"
        fill="url(#cover)" stroke="url(#spine)" stroke-width="1"/>
  <!-- Cubierta principal derecha -->
  <path d="M 64 32 L 106 34 L 106 98 L 64 100 Z"
        fill="url(#cover)" stroke="url(#spine)" stroke-width="1"/>

  <!-- Páginas izquierda -->
  <path d="M 63 36 Q 42 32 26 38 L 26 94 Q 42 88 63 92 Z"
        fill="url(#paper)" stroke="#c8c4b3" stroke-width="0.5"/>
  <!-- Páginas derecha -->
  <path d="M 65 36 Q 86 32 102 38 L 102 94 Q 86 88 65 92 Z"
        fill="url(#paper)" stroke="#c8c4b3" stroke-width="0.5"/>

  <!-- Lomo / pliegue central -->
  <path d="M 64 32 L 64 100" stroke="#082555" stroke-width="2" stroke-linecap="round"/>

  <!-- Líneas de texto izquierda -->
  <g stroke="#a09a85" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="32" y1="48" x2="58" y2="48"/>
    <line x1="32" y1="56" x2="56" y2="56"/>
    <line x1="32" y1="64" x2="58" y2="64"/>
    <line x1="32" y1="72" x2="54" y2="72"/>
    <line x1="32" y1="80" x2="57" y2="80"/>
  </g>
  <!-- Líneas de texto derecha -->
  <g stroke="#a09a85" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.6">
    <line x1="70" y1="48" x2="96" y2="48"/>
    <line x1="70" y1="56" x2="94" y2="56"/>
    <line x1="70" y1="64" x2="96" y2="64"/>
    <line x1="70" y1="72" x2="92" y2="72"/>
    <line x1="70" y1="80" x2="95" y2="80"/>
  </g>

  <!-- Marcador / cinta -->
  <path d="M 78 32 L 78 56 L 82 52 L 86 56 L 86 32 Z"
        fill="#c43a3a" stroke="#7a1f1f" stroke-width="0.5"/>
</svg>
