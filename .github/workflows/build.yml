name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check folio

  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: System deps (GTK4 + GObject introspection)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-gi gir1.2-gtk-4.0 libgirepository1.0-dev \
            libcairo2-dev pkg-config gettext xvfb
      - name: Pin PyGObject built against system GI
        run: |
          python -m pip install --upgrade pip
          pip install "PyGObject<3.50"
      - name: Install Folio
        run: pip install .
      - name: Smoke import test
        run: |
          xvfb-run -a python -c "
          from folio import app, database, scanner, devices, paths
          from folio.ui import (
              window, welcome, book_detail, reading, settings,
              edit_books, stats, discover, device_page,
          )
          print('All modules import OK')
          print(f'  APP_ID: {app.APP_ID}, version: {app.VERSION}')
          "

  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validators
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            desktop-file-utils appstream librsvg2-bin
      - name: Validate .desktop
        run: desktop-file-validate data/io.github.eriote.Folio.desktop
      - name: Validate metainfo
        run: appstreamcli validate --no-net --pedantic data/io.github.eriote.Folio.metainfo.xml || true
      - name: Validate SVG icon
        run: rsvg-convert data/icons/hicolor/scalable/apps/io.github.eriote.Folio.svg -o /tmp/icon.png

  build:
    runs-on: ubuntu-latest
    needs: [lint, smoke, validate-data]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile gettext catalogs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gettext
          find folio/locale -name '*.po' -print0 | while IFS= read -r -d '' po; do
            msgfmt "$po" -o "${po%.po}.mo"
          done
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: folio-dist
          path: dist/
          retention-days: 30
