name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile gettext catalogs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gettext
          find folio/locale -name '*.po' -print0 | while IFS= read -r -d '' po; do
            msgfmt "$po" -o "${po%.po}.mo"
          done
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build

      - name: Extract release notes from metainfo
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          python <<PY
          import re, pathlib, os
          version = os.environ.get("GITHUB_REF_NAME", "v0.0.0").lstrip("v")
          text = pathlib.Path("data/io.github.eriote.Folio.metainfo.xml").read_text()
          m = re.search(
              rf'<release version="{re.escape(version)}".*?>(.*?)</release>',
              text, re.DOTALL,
          )
          notes = ""
          if m:
              body = m.group(1)
              # Strip outer <description> and turn <ul>/<li> into Markdown
              body = re.sub(r'</?description>', '', body)
              body = re.sub(r'<p>(.*?)</p>', r'\1\n', body, flags=re.DOTALL)
              body = re.sub(r'<ul>', '', body)
              body = re.sub(r'</ul>', '', body)
              body = re.sub(r'<li>(.*?)</li>', r'- \1', body, flags=re.DOTALL)
              notes = "\n".join(line.strip() for line in body.splitlines() if line.strip())
          pathlib.Path("release-notes.md").write_text(notes or f"Folio {version}")
          PY
          echo "Generated release notes:"
          cat release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
